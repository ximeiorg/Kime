# Kime 键盘按键配置
# 用户可自定义上滑和下滑显示的文本
# key 为按键的小写字母

# 上滑配置（所有键盘模式通用）
swipe_up:
  q: "1"
  w: "2"
  e: "3"
  r: "4"
  t: "5"
  y: "6"
  u: "7"
  i: "8"
  o: "9"
  p: "0"
  a: "!"
  s: "@"
  d: "#"
  f: "$"
  g: "%"
  h: "^"
  j: "&"
  k: "("
  l: ")"
  z: "|"
  x: "*"
  c: "\\"
  v: "?"
  b: "_"
  n: "-"
  m: "+"

# 下滑配置 - 英文模式（输出大写字母）
swipe_down_english:
  q: "Q"
  w: "W"
  e: "E"
  r: "R"
  t: "T"
  y: "Y"
  u: "U"
  i: "I"
  o: "O"
  p: "P"
  a: "A"
  s: "S"
  d: "D"
  f: "F"
  g: "G"
  h: "H"
  j: "J"
  k: "K"
  l: "L"
  z: "Z"
  x: "X"
  c: "C"
  v: "V"
  b: "B"
  n: "N"
  m: "M"

# 下滑配置 - 五笔86模式（显示字根）
# 第一区：横起笔 (1) - G F D S A
# 第二区：竖起笔 (2) - H J K L M
# 第三区：撇起笔 (3) - T R E W Q
# 第四区：捺起笔 (4) - Y U I O P
# 第五区：折起笔 (5) - N B V C X
swipe_down_wubi:
  # 第一区：横起笔 (1)
  g: "王龶五一戋"
  f: "土士二干革十寸雨"
  d: "大犬三平古龵镸石厂丆"
  s: "木丁西"
  a: "工匚戈艹廿龷七弋戈"
  
  # 第二区：竖起笔 (2)
  h: "目具丨卜⺊上止虎龰皮"
  j: "日曰早廾刂虫丿Ⅱ"
  k: "口Ⅲ川"
  l: "田甲囗四罒车皿力"
  m: "山由贝冂冎几"
  
  # 第三区：撇起笔 (3)
  t: "禾竹丿𠂉彳夂攵"
  r: "白手龵扌斤告𰀪𠂆"
  e: "月⺼彡乃用爫彡𧘇豕"
  w: "人亻八癶"
  q: "金 钅𠂊勺㐅 犭鱼𱼀"
  
  # 第四区：捺起笔 (4)
  y: "言讠文方广亠丶乀京隹"
  u: "立六辛冫丬门疒丷䒑章"
  i: "水氵小氺头𭕄⺌兴光"
  o: "火灬业米亦亚"
  p: "之辶冖宀廴礻"
  
  # 第五区：折起笔 (5)
  n: "已己巳心忄羽乙𠃜"
  b: "子耳了也阝卩㔾凵"
  v: "女刀九臼巛彐"
  c: "又巴马厶龴ス"
  x: "弓匕纟幺母弓𠤎"