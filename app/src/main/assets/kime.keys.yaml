  s: "木 丁 西"
  a: "工 戈 艹 匚 七 弋"
  
  # 第二区：竖起笔 (2)
  h: "目 具 上 止 卜 丨 虎 皮"
  j: "日 早 刂 虫 丿 Ⅱ"
  k: "口 川 Ⅲ"
  l: "田 甲 囗 四 车 力"
  m: "山 由 贝 冂 几 门"
  
  # 第三区：撇起笔 (3)
  t: "禾 竹 丿 彳 夂 攵"
  r: "白 手 扌 斤 爪 爫"
  e: "月 彡 乃 用 家 衣 底 豕"
  w: "人 亻 八 登 头"
  q: "金 钅 勺 夕 犭 鱼 鸟"
  
  # 第四区：捺起笔 (4)
  y: "言 讠 文 方 广 丶 乀"
