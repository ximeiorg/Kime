name: Build and Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APKs (Unsigned)
        run: ./gradlew assembleRelease --no-daemon
        
      - name: Sign Main App APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_main_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          
      - name: Sign Emoji Sticker Plugin APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_emoji_plugin
        with:
          releaseDirectory: plugins/emoji-sticker/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          
      - name: Sign Kaomoji Plugin APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_kaomoji_plugin
        with:
          releaseDirectory: plugins/kaomoji/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          
      - name: Sign Prediction Plugin APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_prediction_plugin
        with:
          releaseDirectory: plugins/prediction-onnx/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
        
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Find signed APKs
        id: find_apks
        run: |
          MAIN_APKS=$(find app/build/outputs/apk/release -name "*-signed.apk" -type f | sort | tr '\n' ':' | sed 's/:$//')
          EMOJI_APKS=$(find plugins/emoji-sticker/build/outputs/apk/release -name "*-signed.apk" -type f | tr '\n' ':' | sed 's/:$//')
          KAOMOJI_APKS=$(find plugins/kaomoji/build/outputs/apk/release -name "*-signed.apk" -type f | tr '\n' ':' | sed 's/:$//')
          PREDICTION_APKS=$(find plugins/prediction-onnx/build/outputs/apk/release -name "*-signed.apk" -type f | tr '\n' ':' | sed 's/:$//')
          
          echo "main_apks=$MAIN_APKS" >> $GITHUB_OUTPUT
          echo "emoji_apks=$EMOJI_APKS" >> $GITHUB_OUTPUT
          echo "kaomoji_apks=$KAOMOJI_APKS" >> $GITHUB_OUTPUT
          echo "prediction_apks=$PREDICTION_APKS" >> $GITHUB_OUTPUT
          
          echo "Main App APKs:"
          echo "$MAIN_APKS" | tr ':' '\n'
          echo "Emoji Plugin APKs:"
          echo "$EMOJI_APKS" | tr ':' '\n'
          echo "Kaomoji Plugin APKs:"
          echo "$KAOMOJI_APKS" | tr ':' '\n'
          echo "Prediction Plugin APKs:"
          echo "$PREDICTION_APKS" | tr ':' '\n'
        
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Kime ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Kime ${{ steps.get_version.outputs.VERSION }}
            
            ### 主程序下载
            选择对应架构的APK：
            - **arm64-v8a**: 适用于大多数现代手机
            - **armeabi-v7a**: 适用于旧款32位手机
            - **x86_64**: 适用于模拟器
            - **universal**: 包含所有架构，体积较大
            
            ### 插件下载
            - **emoji-sticker**: 恶搞兔表情包插件
            - **kaomoji**: 颜文字表情包插件
            - **prediction-onnx**: 智能联想插件
            
            ### 更新说明
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            ${{ steps.find_apks.outputs.main_apks }}
            ${{ steps.find_apks.outputs.emoji_apks }}
            ${{ steps.find_apks.outputs.kaomoji_apks }}
            ${{ steps.find_apks.outputs.prediction_apks }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}