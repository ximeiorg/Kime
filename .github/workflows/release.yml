name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager "ndk;27.3.13750724"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> $GITHUB_ENV
          
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Kime-${{ steps.get_version.outputs.VERSION }}.apk
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Kime ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Kime ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载
            - [Kime-${{ steps.get_version.outputs.VERSION }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/Kime-${{ steps.get_version.outputs.VERSION }}.apk)
            
            ### 更新说明
            请查看提交记录了解详细更新内容。
          files: app/build/outputs/apk/release/Kime-${{ steps.get_version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}