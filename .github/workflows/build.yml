name: Build APK (Test)

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager "ndk;27.3.13750724"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> $GITHUB_ENV
          
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Debug APKs
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload Main App APK
        uses: actions/upload-artifact@v4
        with:
          name: kime-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          
      - name: Upload Emoji Sticker Plugin APK
        uses: actions/upload-artifact@v4
        with:
          name: emoji-sticker-plugin-apk
          path: plugins/emoji-sticker/build/outputs/apk/debug/*.apk
          retention-days: 7
          
      - name: Upload Kaomoji Plugin APK
        uses: actions/upload-artifact@v4
        with:
          name: kaomoji-plugin-apk
          path: plugins/kaomoji/build/outputs/apk/debug/*.apk
          retention-days: 7
          
      - name: Upload Prediction Plugin APK
        uses: actions/upload-artifact@v4
        with:
          name: prediction-onnx-plugin-apk
          path: plugins/prediction-onnx/build/outputs/apk/debug/*.apk
          retention-days: 7